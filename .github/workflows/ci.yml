name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :semanticdb-kotlinc:shadowJar --no-daemon

      - name: Test
        run: ./gradlew :semanticdb-kotlinc:test --no-daemon
        continue-on-error: true

      - name: Upload shadow jar
        uses: actions/upload-artifact@v4
        with:
          name: semanticdb-kotlinc
          path: semanticdb-kotlinc/build/libs/semanticdb-kotlinc-*[!s][!l][!i][!m].jar
