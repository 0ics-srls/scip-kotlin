name: Build & Publish to Nexus

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            21

      - uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build shadow jar
        run: ./gradlew :semanticdb-kotlinc:shadowJar --no-daemon -Pversion=${{ steps.version.outputs.VERSION }}

      - name: Publish to Nexus
        run: ./gradlew :semanticdb-kotlinc:publishShadowPublicationToNexusRepository --no-daemon -Pversion=${{ steps.version.outputs.VERSION }} -x initializeSonatypeStagingRepository
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_USER: ${{ secrets.NEXUS_USER }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
